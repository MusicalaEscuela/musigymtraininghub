<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#8d5cf6" />
    <title>MusiGym Musicala</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/musicoach.png" />
    <link rel="apple-touch-icon" href="./assets/musicoach.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./js/app.js?v=2026-06-23a"></script>
    <script>
      // Auto-limpieza: el service worker dejaba versiones viejas pegadas en los
      // dispositivos. Lo desregistramos y borramos todas las cachas para que la
      // app cargue siempre lo ultimo publicado en GitHub Pages.
      (function () {
        if (!("serviceWorker" in navigator) || location.protocol === "file:") return;
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          var hadWorker = regs.length > 0 || !!navigator.serviceWorker.controller;
          var jobs = regs.map(function (reg) { return reg.unregister(); });
          if (self.caches && caches.keys) {
            jobs.push(caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (k) { return caches.delete(k); }));
            }));
          }
          Promise.all(jobs).then(function () {
            // Si habia un SW controlando, recarga UNA sola vez (sin cache) para
            // soltar su control. El flag evita un bucle de recargas.
            if (hadWorker && !sessionStorage.getItem("sw-cleared")) {
              sessionStorage.setItem("sw-cleared", "1");
              location.reload();
            }
          });
        }).catch(function () {});
      })();
    </script>
  </body>
</html>
