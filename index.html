<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#8d5cf6" />
    <title>MusiGym Musicala</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/musicoach.png" />
    <link rel="apple-touch-icon" href="./assets/musicoach.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./js/app.js"></script>
    <script>
      if ("serviceWorker" in navigator && location.protocol !== "file:") {
        // Cuando un service worker nuevo toma el control, recarga una sola vez
        // para que cada dispositivo abra siempre la última versión.
        let refreshing = false;
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (refreshing) return;
          refreshing = true;
          location.reload();
        });
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").then((reg) => {
            // Busca actualizaciones al abrir y cada vez que la pestaña vuelve al frente.
            reg.update();
            document.addEventListener("visibilitychange", () => {
              if (document.visibilityState === "visible") reg.update();
            });
          }).catch(console.warn);
        });
      }
    </script>
  </body>
</html>
