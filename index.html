<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#8d5cf6" />
    <title>MusiGym Musicala</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/musicoach.png" />
    <link rel="apple-touch-icon" href="./assets/musicoach.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./js/app.js"></script>
    <script>
      if ("serviceWorker" in navigator && location.protocol !== "file:") {
        // Cuando un service worker nuevo toma el control, recarga una sola vez
        // para que cada dispositivo abra siempre la última versión.
        let refreshing = false;
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (refreshing) return;
          refreshing = true;
          location.reload();
        });
        window.addEventListener("load", () => {
          // updateViaCache: "none" => el navegador nunca sirve sw.js desde su
          // cache HTTP, asi siempre detecta una version nueva del service worker.
          navigator.serviceWorker.register("./sw.js", { updateViaCache: "none" }).then((reg) => {
            // Si ya hay un worker nuevo esperando, actívalo de inmediato.
            if (reg.waiting) reg.waiting.postMessage({ type: "SKIP_WAITING" });
            reg.addEventListener("updatefound", () => {
              const nw = reg.installing;
              if (!nw) return;
              nw.addEventListener("statechange", () => {
                if (nw.state === "installed" && navigator.serviceWorker.controller) {
                  nw.postMessage({ type: "SKIP_WAITING" });
                }
              });
            });
            // Busca actualizaciones al abrir y cada vez que la pestaña vuelve al frente.
            reg.update();
            document.addEventListener("visibilitychange", () => {
              if (document.visibilityState === "visible") reg.update();
            });
          }).catch(console.warn);
        });
      }
    </script>
  </body>
</html>
